# ============================================================
# DeepGuard — configs/logging_config.yaml
# Logging handlers, formatters, and level configuration
# ============================================================

logging:
  # ── Global Settings ─────────────────────────────────────
  level: INFO                          # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: json                         # json | text
  propagate: false

  # ── Loggers ─────────────────────────────────────────────
  loggers:
    root:
      level: INFO
      handlers: [console, file]

    deepguard:
      level: DEBUG
      handlers: [console, file, error_file]
      propagate: false

    deepguard.api:
      level: INFO
      handlers: [console, file, access_file]

    deepguard.training:
      level: DEBUG
      handlers: [console, training_file]

    deepguard.inference:
      level: INFO
      handlers: [console, file]

    uvicorn:
      level: INFO
      handlers: [console, file]

    uvicorn.access:
      level: INFO
      handlers: [access_file]
      propagate: false

    sqlalchemy.engine:
      level: WARNING
      handlers: [file]
      propagate: false

    mlflow:
      level: WARNING
      handlers: [file]
      propagate: false

  # ── Handlers ────────────────────────────────────────────
  handlers:
    console:
      class: logging.StreamHandler
      stream: ext://sys.stdout
      formatter: rich                  # rich | json | simple
      level: DEBUG

    file:
      class: logging.handlers.RotatingFileHandler
      filename: ./logs/deepguard.log
      maxBytes: 104857600              # 100 MB
      backupCount: 5
      formatter: json
      level: DEBUG
      encoding: utf-8

    error_file:
      class: logging.handlers.RotatingFileHandler
      filename: ./logs/errors.log
      maxBytes: 52428800               # 50 MB
      backupCount: 3
      formatter: json
      level: ERROR
      encoding: utf-8

    access_file:
      class: logging.handlers.RotatingFileHandler
      filename: ./logs/access.log
      maxBytes: 104857600              # 100 MB
      backupCount: 7
      formatter: access
      level: INFO
      encoding: utf-8

    training_file:
      class: logging.handlers.RotatingFileHandler
      filename: ./logs/training.log
      maxBytes: 209715200              # 200 MB
      backupCount: 10
      formatter: json
      level: DEBUG
      encoding: utf-8

  # ── Formatters ──────────────────────────────────────────
  formatters:
    json:
      format: >-
        {"timestamp": "%(asctime)s", "level": "%(levelname)s",
        "logger": "%(name)s", "module": "%(module)s",
        "line": %(lineno)d, "message": "%(message)s"}
      datefmt: "%Y-%m-%dT%H:%M:%S"

    simple:
      format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d — %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"

    access:
      format: '%(asctime)s | %(message)s'
      datefmt: "%Y-%m-%dT%H:%M:%S"

    rich:
      format: "%(message)s"

  # ── Structlog ───────────────────────────────────────────
  structlog:
    enabled: true
    render_json_logs: true
    add_timestamp: true
    add_log_level: true
    add_caller_info: true
