# ============================================================
# DeepGuard — configs/model_config.yaml
# Vision Transformer architecture and inference configuration
# ============================================================

model:
  # ── Architecture ────────────────────────────────────────
  name: vit_tiny_patch16_224          # timm model identifier
  pretrained: true                     # Load ImageNet-21k weights
  num_classes: 2                       # [real, fake]
  input_size: 224                      # Input resolution (square)
  patch_size: 16                       # ViT patch size
  embed_dim: 768                       # Embedding dimension (Base)
  depth: 12                            # Transformer depth
  num_heads: 12                        # Multi-head attention heads
  mlp_ratio: 4.0                       # MLP expansion ratio
  drop_rate: 0.1                       # Dropout rate
  attn_drop_rate: 0.0                  # Attention dropout rate
  drop_path_rate: 0.1                  # Stochastic depth rate

  # ── Classification Head ─────────────────────────────────
  head:
    type: linear                       # linear | mlp | attention_pool
    hidden_dim: 512                    # Hidden units (for mlp head)
    dropout: 0.3                       # Head dropout
    activation: gelu                   # Activation function

  # ── Fine-tuning Strategy ────────────────────────────────
  fine_tuning:
    strategy: full                     # full | partial | head_only | lora
    frozen_layers: []                  # Layers to freeze (empty = all unfrozen)
    layer_decay: 0.75                  # Layer-wise LR decay factor

  # ── Normalization ───────────────────────────────────────
  normalization:
    mean: [0.485, 0.456, 0.406]        # ImageNet mean
    std: [0.229, 0.224, 0.225]         # ImageNet std

# ── Inference ─────────────────────────────────────────────
inference:
  device: auto                         # auto | cpu | cuda | mps
  precision: fp32                      # fp32 | fp16 | bf16 | int8
  batch_size: 8                        # Inference batch size
  confidence_threshold: 0.5           # Binary classification threshold
  use_onnx: false                      # Use ONNX Runtime instead of PyTorch
  use_torch_compile: false             # torch.compile() optimization
  tta_enabled: false                   # Test-time augmentation
  tta_flips: true                      # Horizontal flip TTA

  # ── Multi-face aggregation ──────────────────────────────
  face_aggregation: mean               # mean | max | weighted_mean

# ── ONNX Export ───────────────────────────────────────────
onnx:
  opset_version: 17
  dynamic_axes:
    input:
      0: batch_size
    output:
      0: batch_size
  optimize: true
  quantize: false                      # INT8 quantization
  providers:
    - CPUExecutionProvider

# ── Model Variants ────────────────────────────────────────
variants:
  vit_tiny:
    name: vit_tiny_patch16_224
    embed_dim: 192
    depth: 12
    num_heads: 3

  vit_small:
    name: vit_small_patch16_224
    embed_dim: 384
    depth: 12
    num_heads: 6

  vit_base:
    name: vit_base_patch16_224
    embed_dim: 768
    depth: 12
    num_heads: 12

  vit_large:
    name: vit_large_patch16_224
    embed_dim: 1024
    depth: 24
    num_heads: 16
