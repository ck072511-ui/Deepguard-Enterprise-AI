worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=detect_zone:10m rate=10r/m;

    # Upstream — FastAPI backend
    upstream deepguard_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP Server ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security
        server_tokens off;
        client_max_body_size 256M;
        client_body_timeout 60s;
        client_header_timeout 10s;

        # ── API Proxy ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass         http://deepguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # CORS headers (override if needed)
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        }

        # ── Detection endpoint (larger upload limits) ──────
        location /api/v1/detect {
            limit_req zone=detect_zone burst=5 nodelay;

            proxy_pass         http://deepguard_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            client_max_body_size 512M;
            proxy_read_timeout   300s;
            proxy_send_timeout   300s;
        }

        # ── API Docs ───────────────────────────────────────
        location /docs {
            proxy_pass http://deepguard_api;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://deepguard_api;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://deepguard_api;
            proxy_set_header Host $host;
        }

        # ── Metrics (internal access only) ─────────────────
        location /metrics {
            # Only allow internal network
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://deepguard_api;
        }

        # ── Health check ───────────────────────────────────
        location /health {
            proxy_pass http://deepguard_api/api/v1/health;
            access_log off;
        }

        # ── Static files / Streamlit frontend ─────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
